name: Live Endpoint Listener

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Generate SSH Key for Tunneling
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 2048 -N "" -f ~/.ssh/id_rsa
          sudo killall python3 || true 

      - name: Start Server and Open Tunnel
        run: |
          cat << 'EOF' > server.py
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import sys

          class Listener(BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  data = self.rfile.read(content_length).decode('utf-8')
                  print("\n==================================================", flush=True)
                  print(f"[RECEIVED TEXT]: {data}", flush=True)
                  print("==================================================\n", flush=True)
                  self.send_response(200)
                  self.send_header("Content-type", "text/plain")
                  self.end_headers()
                  self.wfile.write(b"Text successfully sent to GitHub terminal!")

              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-type", "text/plain")
                  self.end_headers()
                  self.wfile.write(b"The endpoint is live and active! Use POST to send terminal logs.")

          print("Starting server on port 8080...", flush=True)
          HTTPServer(('0.0.0.0', 8080), Listener).serve_forever()
          EOF
          
          # Start the Python server in the background inside this step
          python3 server.py &
          sleep 2
          
          echo "=============================================================="
          echo "LOOK BELOW FOR YOUR PUBLIC URL (it ends in .lhr.life)"
          echo "=============================================================="
          
          # Run the tunnel in the foreground of the same step so logs stream correctly
          ssh -o StrictHostKeyChecking=no -R 80:localhost:8080 nokey@localhost.run
