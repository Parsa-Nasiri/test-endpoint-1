name: Keep-Alive Endpoint Server

on: [workflow_dispatch, push]

jobs:
  live-server:
    runs-on: ubuntu-latest
    steps:
      - name: Start Background HTTP Server
        run: |
          python3 -c "
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import sys
          class Listener(BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  data = self.rfile.read(content_length).decode('utf-8')
                  print(f'\n[ENDPOINT LOG]: {data}\n', flush=True)
                  self.send_response(200)
                  self.end_headers()
          print('Starting server on port 8080...', flush=True)
          HTTPServer(('0.0.0.0', 8080), Listener).serve_forever()
          " &
          sleep 2

      - name: Expose Server & Wait Indefinitely
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # Install ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          # Connect and start tunnel
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok http 8080 --log=stdout &
          sleep 5
          
          # Fetch and output the public URL to the terminal
          echo "--------------------------------------------------------"
          echo "YOUR PUBLIC ENDPOINT URL IS:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "--------------------------------------------------------"
          
          # Keep-alive loop to prevent the job from finishing
          echo "Listening for incoming texts. Press 'Cancel workflow' to stop manually."
          while true; do
            sleep 10
          done
