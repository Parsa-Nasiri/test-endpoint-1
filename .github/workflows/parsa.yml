name: Live Endpoint Listener

on:
  workflow_dispatch: # Allows you to start it manually from the Actions tab

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Generate SSH Key for Tunneling
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 2048 -N "" -f ~/.ssh/id_rsa

          # Clear out any old background processes if running
          sudo killall python3 || true 

      - name: Start Python Server
        run: |
          cat << 'EOF' > server.py
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import sys

          class Listener(BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  data = self.rfile.read(content_length).decode('utf-8')
                  print(f"\n==================================================")
                  print(f"[RECEIVED TEXT]: {data}")
                  print(f"==================================================\n", flush=True)
                  self.send_response(200)
                  self.send_header("Content-type", "text/plain")
                  self.end_headers()
                  self.wfile.write(b"Text successfully sent to GitHub terminal!")

          print("Starting server on port 8080...", flush=True)
          HTTPServer(('0.0.0.0', 8080), Listener).serve_forever()
          EOF
          python3 server.py &
          sleep 2

      - name: Open Public Tunnel & Listen
        run: |
          echo "=============================================================="
          echo "LOOK BELOW FOR YOUR PUBLIC URL (it ends in .lhr.life)"
          echo "=============================================================="
          
          # This starts the public tunnel and keeps the workflow running/listening
          ssh -o StrictHostKeyChecking=no -R 80:localhost:8080 nokey@localhost.run
