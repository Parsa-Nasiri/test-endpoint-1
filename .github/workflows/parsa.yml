name: Always Active Webhook Listener

on:
  repository_dispatch:
    types: [incoming_text]

jobs:
  log-to-terminal:
    runs-on: ubuntu-latest
    steps:
      - name: Print Received Text
        run: |
          echo "=========================================="
          echo "RECEIVED: ${{ github.event.client_payload.text }}"
          echo "=========================================="
