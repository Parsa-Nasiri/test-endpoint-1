name: Live Endpoint Listener

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Start Server and Open Fixed Tunnel
        run: |
          cat << 'EOF' > server.py
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import sys

          class Listener(BaseHTTPRequestHandler):
              def do_POST(self):
                  # 1. Read incoming text data from your local machine
                  content_length = int(self.headers['Content-Length'])
                  data = self.rfile.read(content_length).decode('utf-8')
                  
                  print("\n==================================================", flush=True)
                  print(f"[RECEIVED FROM LOCAL]: {data}", flush=True)
                  
                  # 2. PROCESS THE REQUEST DATA HERE
                  # (As an example, this turns your text uppercase and reverses it)
                  processed_data = data.upper()[::-1]
                  
                  # 3. Formulate the response payload to send back
                  response_to_local = f"GitHub Processed Result: {processed_data}"
                  
                  print(f"[SENT BACK TO LOCAL]: {response_to_local}", flush=True)
                  print("==================================================\n", flush=True)

                  # 4. Send response back to your local terminal
                  self.send_response(200)
                  self.send_header("Content-type", "text/plain")
                  self.end_headers()
                  self.wfile.write(response_to_local.encode('utf-8'))

              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-type", "text/plain")
                  self.end_headers()
                  self.wfile.write(b"Fixed endpoint is active. Use POST to process text data.")

          print("Starting server on port 8080...", flush=True)
          HTTPServer(('0.0.0.0', 8080), Listener).serve_forever()
          EOF
          
          # Run the server in the background
          python3 server.py &
          sleep 2
          
          echo "=============================================================="
          echo "YOUR FIXED ENDPOINT URL IS: https://parsa-nasiri-endpoint.serveo.net"
          echo "=============================================================="
          
          # Connect to Serveo and request the custom subdomain
          ssh -o StrictHostKeyChecking=no -R parsa-nasiri-endpoint:80:localhost:8080 serveo.net
